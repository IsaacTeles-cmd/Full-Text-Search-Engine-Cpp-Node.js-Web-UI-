<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Search Engine</title>

<style>
    body{
        margin: 0;
        font-family: Arial, Helvetica, sans-serif;
        background: var(--bg);
        color: var(--text);
        transition: 0.3s;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        flex-direction: column;
    }

    .logo{
        text-align: center;
        margin-bottom: 30px;
    }

    .logo-icon{
        width: 90px;
        height: 90px;
        color: var(--icon);
    }

    .logo h1{
        font-weight: normal;
        font-size: 36px;
        margin: 0;
    }

    .search-container{
        position: relative;
        display: flex;
        align-items: center;
        background: var(--box);
        border-radius: 30px;
        padding: 5px;
        width: 500px;
        max-width: 90%;
        box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .search-container input{
        flex: 1;
        border: none;
        outline: none;
        font-size: 16px;
        padding: 10px 15px;
        border-radius: 30px;
    }

    .search-btn{
        background: var(--border);
        border: none;
        color: var(--icon);
        padding: 10px 15px;
        border-radius: 50%;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: 0.2s;
    }

    .search-btn:hover{
        background: #c0c0c0;
    }

    .top-bar{
        position: absolute;
        top: 20px;
        left: 20px;
    }

    #reindex-btn{
        background: var(--box);
        color: var(--text);
        border: 1px solid var(--border);
        padding: 8px 14px;
        border-radius: 20px;
        cursor: pointer;
        font-size: 14px;
        transition: 0.2s;
    }

    #reindex-btn:hover{
        background: var(--border);
    }

    #reindex-btn.loading{
        opacity: 0.6;
        cursor: not-allowed;
    }

    .results{
        margin-top: 40px;
        width: 600px;
        max-width: 90%;
    }

    .result-item{
        background: var(--box);
        padding: 15px;
        margin-bottom: 10px;
        border: 1px solid var(--border);
        border-radius: 8px;
        box-shadow: 0 1px 4px rgba(0,0,0,0.1);
    }

    .file{
        font-size: 18px;
        color: var(--link);
    }

    .score{
        font-size: 14px;
        color: var(--text-secondary);
    }

    .suggestions{
        top: 100%;
        left: 0;
        background: var(--box);
        width: 500px;
        max-width: 90%;
        border-radius: 8px;
        margin-top: 5px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        position: absolute;
    }

    .suggestion-item{
        padding: 10px;
        cursor: pointer;
    }

    .suggestion-item:hover{
        background: #f0f0f0;
    }

    :root{
        --bg: #f2f2f2;
        --text: #000;
        --box: #ffffff;
        --border: #ddd;
        --link: #1a0dab;
        --icon: #000;
        --text-secondary: #555;
    }

    .dark{
        --bg: #121212;
        --text: #e0e0e0;
        --box: #1e1e1e;
        --border: #333;
        --link: #8ab4f8;
        --icon: #e0e0e0;
        --text-secondary: #aaa;
    }

    #theme-toggle{
        position: absolute;
        top: 20px;
        right: 20px;
        border: none;
        background: var(--box);
        color: var(--text);
        padding: 10px;
        border-radius: 50%;
        cursor: pointer;
        box-shadow: 0 7px 5px rgba(0,0,0,0.2);
    }

    .dark .search-btn img {
        filter: invert(1);
    }

</style>
</head>
<body>

    <button id="theme-toggle" onclick="toggleTheme()">Dark</button>
    <div class="top-bar">
    <button id="reindex-btn" onclick="reindex()">Reindex</button>
    </div>
    <div class="logo">
     <svg class="logo-icon" viewBox="0 0 24 24" 
        fill="none" 
        stroke="currentColor" 
        stroke-width="2"
        stroke-linecap="round" 
        stroke-linejoin="round">

        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
     </svg>
        <h1>Index Lookup</h1>
    </div>

    <div class="search-container">
        <input id="q" 
        type="text"
        placeholder="Search..."
        oninput="handleInput(event)"
        onkeypress="handleKey(event)">
        
        
        <button class="search-btn" onclick="search()">
            <img src="assets/icons/search.svg" width="16">
        </button>
    </div>

    <div class="suggestions" id="suggestions"></div>
    
    <div class="results" id="results"></div>

    <script>
        async function search(){
            const q = document.getElementById("q").value.trim();
            if(!q) return;

            const res = await fetch(`/search?q=${encodeURIComponent(q)}`);
            if(!res.ok) return;

            const data = await res.json();

            const container = document.getElementById("results");
            container.innerHTML = "";

            if(data.length === 0){
                container.innerHTML = "<p>No results found.</p>";
                return;
            }

            data.forEach(item => {
                const div = document.createElement("div");
                div.className = "result-item";

                const fileName = document.createElement("div");
                fileName.className = "file";
                fileName.textContent = item.file; // Please no XSS.

                const score = document.createElement("div");
                score.className = "score";
                score.textContent = `Score: ${item.score.toFixed(4)}`;

                div.appendChild(fileName);
                div.appendChild(score);
                container.appendChild(div);
            });
        }
        
        let timeout;

        async function fetchSuggestions(q){
            if(!q){
                document.getElementById("suggestions").innerHTML = "";
                return;
            }
            
            const res = await fetch(`/autocomplete?q=${encodeURIComponent(q)}`);
            if(!res.ok) return;
            
            const data = await res.json();

            const box = document.getElementById("suggestions");
            box.innerHTML = "";
            
            data.forEach(item =>{
                const div = document.createElement("div");
                div.className = "suggestion-item";
                div.textContent = item;
                
                div.onclick = () =>{
                    document.getElementById("q").value = item;
                    box.innerHTML = "";
                    search();
                };
                box.appendChild(div);
            });
        }
        
        // Debounce.                   I'm losing it. . .
        function handleInput(e){
            clearTimeout(timeout);
            
            const value = e.target.value;
            
            timeout = setTimeout(()=>{
                fetchSuggestions(value);
            }, 300);
        }

        function handleKey(e){
            if(e.key === "Enter"){
                document.getElementById("suggestions").innerHTML = "";
                search()
            }
        }

        document.addEventListener("click", (e) =>{
            const box = document.getElementById("suggestions");
            const input = document.getElementById("q");

            if(!box.contains(e.target) && e.target !== input){
                box.innerHTML = "";
            }
        });

        // Toggle dark or light mode.
        const btn = document.getElementById("theme-toggle");

        function toggleTheme(){
            document.body.classList.toggle("dark");

            const isDark = document.body.classList.contains("dark");
            localStorage.setItem("theme", isDark ? "dark" : "light");

            btn.textContent = isDark ? "Light" : "Dark";
        }

        // Save theme dark/light
        window.onload = () =>{
            const saved = localStorage.getItem("theme");

            if(saved === "dark"){
                document.body.classList.add("dark");
                btn.textContent = "Light";
            }
        };

        async function reindex() {
            const btn = document.getElementById("reindex-btn");
            btn.textContent = "Reindexing...";
            btn.classList.add("loading");
            btn.disabled = true;

            try {
                const res = await fetch("/reindex", { method: "POST" });
                if (!res.ok) throw new Error();
                btn.textContent = "Done";
            } catch (err) {
                btn.textContent = "Error";
            } finally {
                setTimeout(() => {
                btn.textContent = "Reindex";
                btn.disabled = false;
                btn.classList.remove("loading");
                }, 1500);
            }
        }


        </script>
</body>
